# Training config for T4 GPUs — FAST version
# ByT5-small (300M params) with reduced data for practical Colab training
# Estimated: ~6-10 hours on T4

# Model — small is ~2x faster than base per step
model: "google/byt5-small"

# Data
train_data: "data/clue_answer_pairs/train.jsonl"
val_data: "data/clue_answer_pairs/val.jsonl"
max_answer_len: 25
max_input_len: 256
max_target_len: 32
online_augment: true # adds variety even with fewer static augmentations

# Training — byt5-small fits batch=16 on T4 with fp16
output_dir: "checkpoints/clue_answerer"
epochs: 3
batch_size: 16
gradient_accumulation_steps: 4 # effective batch = 64
lr: 5.0e-4 # slightly higher LR for smaller model + fewer steps
weight_decay: 0.01
warmup_steps: 200

# Precision — T4 does NOT support bf16
fp16: true
bf16: false

# Saving / eval
save_steps: 2000
eval_steps: 2000
logging_steps: 100

# W&B
wandb_project: "conditional-bp-solver"
